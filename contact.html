<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<body>
    <h1>Contact Us</h1>
    <form action="#" method="POST">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br>
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" required></textarea><br>
        <input type="submit" value="Submit">
    </form>

    <h2>Contact Information</h2>
    <p>Email: contact@aopay.com</p>
    <p>Phone: +1 234 567 8900</p>

    <h2>Business Hours</h2>
    <p>Monday - Friday: 9 AM - 5 PM</p>
    <p>Saturday: 10 AM - 4 PM</p>
    <p>Sunday: Closed</p>

    <h2>Location</h2>
    <p>1234 Pay Street, Fintech City, FS 12345</p>

    <h2>Follow Us</h2>
    <p>Social Media:
        <a href="https://www.facebook.com/aopay">Facebook</a>,
        <a href="https://www.twitter.com/aopay">Twitter</a>,
        <a href="https://www.instagram.com/aopay">Instagram</a>
    </p>
</body>
</html>
